optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0001,
  weight_decay : 0.001
}}
scheduler: {
  type: CosineAnnealingLR,
  kwargs: {
  T_max: 120,      # 对应 max_epoch
  eta_min: 0.00003  # 最小学习率
}}
bnmscheduler: {
  type: Lambda,
  kwargs: {
  decay_step: 21,
  bn_decay: 0.9,
  bn_momentum: 0.9,
  lowest_decay: 0.01
}}
dataset : {
  train : { _base_: cfgs/dataset_configs/Tooth.yaml,
            others: {subset: 'train'}},
  val : { _base_: cfgs/dataset_configs/Tooth.yaml,
            others: {subset: 'val'}},
  test : { _base_: cfgs/dataset_configs/Tooth.yaml,
            others: {subset: 'test'}}}
model : {
  NAME: PoinTr, num_pred: 2048, num_query: 128, knn_layer: 2, trans_dim: 256}
total_bs : 16
step_per_update : 1
max_epoch : 120
consider_metric: CDL2